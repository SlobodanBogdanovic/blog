remote_theme: "mmistakes/minimal-mistakes@4.24.0"
plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

title: "Slobodan Bogdanovic"
name: "Slobodan Bogdanovic"
description: "QA Lead | Test Automation | Agile Delivery"
url: "https://slobodanbogdanovic.github.io"
baseurl: "/blog"

author:
  name: "Slobodan Bogdanovic"
  bio: "QA Lead, Test Automation, Agile Delivery. Writing about software quality, engineering, and delivery."
  location: "Serbia"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/bogdanovics"

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true

paginate: 5
paginate_path: /page:num/
